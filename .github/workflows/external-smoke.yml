name: External Smoke

on:
  push:
    branches:
      - core
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: external-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scaffold-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run External Scaffold Smoke
        run: npm run smoke:external
