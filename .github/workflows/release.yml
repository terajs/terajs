name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to release from
        required: true
        default: main
        type: string

concurrency:
  group: release-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: npm ci

      - name: Run Publish Metadata Guard
        run: npm run guard:publish-metadata

      - name: Describe Release Behavior
        run: |
          echo "The Changesets action will open or update a version PR when release notes are pending."
          echo "After that version PR is merged, run this workflow again to publish the packages."
          echo "npm publish uses trusted publishing through GitHub Actions OIDC when the package settings on npm are configured for this workflow."

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release:publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}