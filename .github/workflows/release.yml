name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to release from
        required: true
        default: main
        type: string

concurrency:
  group: release-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        run: npm install --global npm@^11.5.1

      - name: Show Node and npm Versions
        run: |
          node --version
          npm --version

      - name: Install Dependencies
        run: npm ci

      - name: Run Publish Metadata Guard
        run: npm run guard:publish-metadata

      - name: Describe Release Behavior
        run: |
          echo "When release notes are pending, this workflow versions packages locally and pushes the release branch."
          echo "The version step also advances the repo-level release version so Terajs keeps one monotonic release marker beside the package versions."
          echo "Open or update the version PR from that branch, merge it, then run this workflow again on main to publish the packages and push the matching repo tag."
          echo "npm publish uses trusted publishing through GitHub Actions OIDC when the package settings on npm are configured for this workflow."

      - name: Version Packages
        run: npm run version-packages

      - name: Detect Version Diff
        id: version_diff
        shell: bash
        run: |
          if git diff --quiet --exit-code; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push Version Branch
        if: steps.version_diff.outputs.has_changes == 'true'
        id: version_branch
        shell: bash
        run: |
          release_branch="changeset-release/${{ inputs.ref }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "$release_branch":"refs/remotes/origin/$release_branch" || true
          git switch -C "$release_branch"
          git add -A
          git commit -m "chore: version packages"
          git push --force-with-lease origin "HEAD:$release_branch"

          compare_url="${{ github.server_url }}/${{ github.repository }}/compare/${{ inputs.ref }}...$release_branch?expand=1"
          echo "branch=$release_branch" >> "$GITHUB_OUTPUT"
          echo "compare_url=$compare_url" >> "$GITHUB_OUTPUT"

      - name: Summarize Version Branch
        if: steps.version_diff.outputs.has_changes == 'true'
        run: |
          echo "Version changes were pushed to \\`${{ steps.version_branch.outputs.branch }}\\`." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Open or refresh the release PR here:" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.version_branch.outputs.compare_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "After that PR is merged, rerun the Release workflow on main to publish the packages." >> "$GITHUB_STEP_SUMMARY"

      - name: Guard Publish Branch
        if: steps.version_diff.outputs.has_changes == 'false' && inputs.ref != 'main'
        run: |
          echo "Refusing to publish from '${{ inputs.ref }}'. Run the Release workflow against 'main'."
          exit 1

      - name: Configure Release Git Identity
        if: steps.version_diff.outputs.has_changes == 'false' && inputs.ref == 'main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish Packages
        if: steps.version_diff.outputs.has_changes == 'false' && inputs.ref == 'main'
        run: npm run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Release Tags
        if: steps.version_diff.outputs.has_changes == 'false' && inputs.ref == 'main'
        run: npm run release:tag:push

      - name: Resolve Release Tag
        if: steps.version_diff.outputs.has_changes == 'false' && inputs.ref == 'main'
        id: release_tag
        shell: bash
        run: |
          echo "tag=v$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.version_diff.outputs.has_changes == 'false' && inputs.ref == 'main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          make_latest: true